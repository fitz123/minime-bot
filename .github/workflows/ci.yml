name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Dry-run package
        run: npm pack --dry-run

      - name: Check retired contract if configured
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['check:schema-guard-contract'] ? 0 : 1)"; then
            npm run check:schema-guard-contract
          else
            echo "No check:schema-guard-contract script configured"
          fi
